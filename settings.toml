[default]
log_level = "INFO"

# One [[default.servers]] block per etcd endpoint. ``label`` is the name shown
# in the browser tree; ``api`` selects the backend ("v2" or "v3").

[[default.servers]]
label = "etcd 1"
api = "v3"
host = "etcd1"
port = 2379


[[default.servers]]
label = "etcd 2"
api = "v3"
host = "etcd2"
port = 2379
