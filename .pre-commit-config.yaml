default_language_version:
    python: python3.12

# Snapshot baselines from pytest-textual-snapshot are byte-exact terminal
# captures and must not be touched by formatting hooks.
exclude: ^tests/__snapshots__/

repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v5.0.0
      hooks:
          - id: check-added-large-files
          - id: check-toml
          - id: check-yaml
            args:
                - --unsafe
          - id: end-of-file-fixer
          - id: trailing-whitespace
          - id: check-json
          - id: check-merge-conflict
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.10.0
      hooks:
          - id: ruff
            args:
                - --fix
          - id: ruff-format
    - repo: https://github.com/gitleaks/gitleaks
      rev: v8.30.1
      hooks:
          - id: gitleaks
    - repo: local
      hooks:
          - id: ty
            name: ty check
            language: system
            entry: uv run ty check
            types: [python]
            pass_filenames: false
            require_serial: true
